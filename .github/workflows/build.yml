name: Build Forge Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Make gradlew executable
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew build
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mod-jar
        path: build/libs/*.jar
        
    - name: Get mod version
      id: mod_version
      run: echo "version=$(grep 'mod_version=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_OUTPUT
      
    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: build/libs/*.jar
        tag_name: v${{ steps.mod_version.outputs.version }}
        name: Horse Meat Mod v${{ steps.mod_version.outputs.version }}
        body: |
          ## Horse Meat Mod v${{ steps.mod_version.outputs.version }}
          
          A Forge mod for Minecraft 1.21.1 that adds extra meat drops from horses.
          
          ### Features:
          - 50% chance for 1-3 cooked beef (horse sausage)
          - 30% chance for 1-2 cooked porkchop (frikandel)
          
          ### Installation:
          1. Download the JAR file from this release
          2. Place it in your Minecraft mods folder
          3. Launch Minecraft with Forge 1.21.1
          
          Built automatically via GitHub Actions.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
