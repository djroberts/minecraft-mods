name: Build Forge Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Make gradlew executable
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew build
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mod-jar
        path: build/libs/*.jar
        retention-days: 30
        
    - name: Get mod version
      id: mod_version
      run: echo "version=$(grep 'mod_version=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_OUTPUT
      
    - name: Create Release (Manual)
      if: github.ref == 'refs/heads/main'
      run: |
        echo "## Build Complete!" >> $GITHUB_STEP_SUMMARY
        echo "Mod version: ${{ steps.mod_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "Download the JAR file from the artifacts section below." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "To create a release manually:" >> $GITHUB_STEP_SUMMARY
        echo "1. Go to the 'Actions' tab" >> $GITHUB_STEP_SUMMARY
        echo "2. Click on this workflow run" >> $GITHUB_STEP_SUMMARY
        echo "3. Download the 'mod-jar' artifact" >> $GITHUB_STEP_SUMMARY
        echo "4. Create a new release on the main page" >> $GITHUB_STEP_SUMMARY
        echo "5. Upload the JAR file to the release" >> $GITHUB_STEP_SUMMARY
