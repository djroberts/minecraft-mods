name: Build and Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Generate timestamp version
      id: version
      run: |
        VERSION=$(date +%Y.%m.%d-%H%M)
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Extract version info
      id: versions
      run: |
        MC_VERSION=$(grep "minecraft_version:" build.gradle | grep -v "minecraft_version_range" | sed "s/.*'\(.*\)'.*/\1/")
        NEO_VERSION=$(grep "neo_version:" build.gradle | grep -v "neo_version_range" | sed "s/.*'\(.*\)'.*/\1/")
        echo "minecraft_version=$MC_VERSION" >> $GITHUB_OUTPUT
        echo "neoforge_version=$NEO_VERSION" >> $GITHUB_OUTPUT

    - name: Build with Gradle
      run: ./gradlew build

    - name: Rename JAR to include versions
      run: |
        mv build/libs/horsemeat-*.jar "build/libs/horsemeat-mc${{ steps.versions.outputs.minecraft_version }}-neoforge${{ steps.versions.outputs.neoforge_version }}-${{ steps.version.outputs.version }}.jar"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Horse Meat Mod v${{ steps.version.outputs.version }}
        body: |
          Auto-built release from commit ${{ github.sha }}
          
          Built on: ${{ steps.version.outputs.version }}
          Commit: ${{ github.sha }}
        files: |
          build/libs/*.jar
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
