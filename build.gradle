buildscript {
    repositories {
        maven {
            url = "https://maven.minecraftforge.net/"
        }
        mavenCentral()
    }
    dependencies {
        // Use ForgeGradle 6.x for Minecraft 1.21.x
        classpath "net.minecraftforge.gradle:ForgeGradle:6.0.1"
    }
}

apply plugin: "net.minecraftforge.gradle"
apply plugin: "java"

group = "com.horsemeat"
version = "1.0.0"
archivesBaseName = "horsemeat"

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(17))
    }
}

repositories {
    maven {
        url = "https://maven.minecraftforge.net/"
    }
    mavenCentral()
}

dependencies {
    minecraft "net.minecraftforge:forge:1.21.1-61.1.3"
}

minecraft {
    version = "1.21.1-61.1.3"
    runDir = "run"
    mappings channel: "official", version: "1.21.1"
}

tasks.jar {
    from(sourceSets.main.output)
}