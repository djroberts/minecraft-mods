plugins {
    id 'java'
    id 'net.minecraftforge.gradle' version '5.1.+'
}

group = 'com.horsemeat'
version = '1.0.0'
archivesBaseName = 'horsemeat'

sourceCompatibility = '17'
targetCompatibility = '17'

repositories {
    maven {
        name = "Forge"
        url = "https://maven.minecraftforge.net/"
    }
    mavenCentral()
}

dependencies {
    minecraft "net.minecraftforge:forge:1.21.1-61.1.3"
}

minecraft {
    version = "1.21.1-61.1.3"
    runDir = "run"
    mappings channel: 'official', version: '1.21.1'
}

// Optional: jar task to include resources and META-INF mods.toml
tasks.jar {
    from(sourceSets.main.output)
    manifest {
        attributes(
            'Specification-Title': 'Horse Meat Mod',
            'Specification-Vendor': 'Daniel Roberts',
            'Specification-Version': version,
            'Implementation-Title': 'Horse Meat Mod',
            'Implementation-Version': version,
            'Implementation-Vendor': 'Daniel Roberts'
        )
    }
}