plugins {
    id "java"
    id "net.minecraftforge.gradle" version "7.0.15"
}

group = "com.horsemeat"
version = "1.0.0"
archivesBaseName = "horsemeat"

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(17))
    }
}

repositories {
    maven {
        name = "Forge"
        url = "https://maven.minecraftforge.net/"
    }
    mavenCentral()
}

dependencies {
    minecraft "net.minecraftforge:forge:1.21.1-61.1.3"
}

minecraft {
    version = "1.21.1-61.1.3"
    runDir = "run"
    mappings channel: 'official', version: '1.21.1'
}

tasks.jar {
    from(sourceSets.main.output)
}