plugins {
    id 'java-library'
    id 'eclipse'
    id 'idea'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.140'
}

version = '1.0.0'
group = 'com.horsemeat'

base {
    archivesName = 'horsemeat'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

neoForge {
    version = '21.11.38-beta'
    runs {
        client {
            client()
            systemProperty 'neoforge.enabledGameTestNamespaces', 'horsemeat'
        }
        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', 'horsemeat'
        }
    }
    mods {
        horsemeat {
            sourceSet sourceSets.main
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // NeoForge modding dependencies
}

tasks.withType(ProcessResources).configureEach {
    var replaceProperties = [
            minecraft_version: '1.21.11',
            minecraft_version_range: '[1.21.3,1.22)',
            neo_version: '21.11.38-beta',
            neo_version_range: '[21.11.38-beta,)',
            loader_version_range: '[4,)',
            mod_id: 'horsemeat',
            mod_name: 'Horse Meat Mod',
            mod_license: 'All Rights Reserved',
            mod_version: '1.0.0',
            mod_authors: 'Gargoyle',
            mod_description: 'Extra meat drops from horses!'
    ]
    inputs.properties replaceProperties

    filesMatching(['META-INF/neoforge.mods.toml']) {
        expand replaceProperties
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
