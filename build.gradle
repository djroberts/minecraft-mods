buildscript {
    repositories {
        maven {
            name = "Forge"
            url = "https://maven.minecraftforge.net/"
        }
        mavenCentral()
    }
    dependencies {
        // ForgeGradle 6 for Minecraft 1.21.x
        classpath 'net.minecraftforge.gradle:ForgeGradle:6.1.0'
    }
}

apply plugin: 'net.minecraftforge.gradle'
apply plugin: 'java'

group = 'com.horsemeat'
version = '1.0.0'
archivesBaseName = 'horsemeat'

sourceCompatibility = '17'
targetCompatibility = '17'

repositories {
    maven {
        name = "Forge"
        url = "https://maven.minecraftforge.net/"
    }
    mavenCentral()
}

dependencies {
    minecraft 'net.minecraftforge:forge:1.21.1-61.1.3'
}

minecraft {
    version = "1.21.1-61.1.3"
    runDir = "run"
    mappings channel: 'official', version: '1.21.1'
}

tasks.jar {
    from(sourceSets.main.output)
    manifest {
        attributes(
            'Specification-Title': 'Horse Meat Mod',
            'Specification-Vendor': 'Daniel Roberts',
            'Specification-Version': version,
            'Implementation-Title': 'Horse Meat Mod',
            'Implementation-Version': version,
            'Implementation-Vendor': 'Daniel Roberts'
        )
    }
}